version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pc_database
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=${MSSQL_PID}
    ports:
      - "${DB_PORT}:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:alpine
    container_name: pc_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data

  db-init:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: pc_db_initializer
    volumes:
      - .:/src
      - mssql_data:/var/opt/mssql
    working_dir: /src
    environment:
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - DB_NAME=${DB_NAME}
      - BACPAC_PATH=${BACPAC_PATH}
    entrypoint: /src/docker/init-db.sh
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pc_web_api
    ports:
      - "${API_PORT}:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=Server=db;Database=${DB_NAME};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True;
      - ConnectionStrings__LiveConnection=Server=db;Database=${DB_NAME};User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True;
      - Redis__Hosts__0__Host=redis
      - Redis__Hosts__0__Port=6379
      - Redis__Password=
      - JwtSettings__SecretKey=${JWT_SECRET}
      - SendGridSettings__Key=${SENDGRID_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      db-init:
        condition: service_completed_successfully

volumes:
  mssql_data:
  redis_data:
